&lt;style&gt;
:root {
  --bg: #0e0e0e;
  --surface: #161616;

  --text: #e8e2d6;

  --dim: #3a3530;

  --z1: #e8c547;   /* Digital Market — gold */
  --z2: #e05a2b;   /* MeGa Market — burnt orange */
  --z3: #c84b8f;   /* REGIONAL Market — magenta */
  --z4: #4b9ec8;   /* Educational Center — blue */
  --z5: #8bc84b;   /* Opera/Entertainment — green */
  --z6: #7b6ee8;   /* Open Air — violet */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
}
.logo span { color: var(--z1); }
.tagline {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Site input ── */
.site-bar {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 1rem;
  margin-bottom: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1.2rem;
  align-items: end;
}
.field label {
  display: block;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
input[type=number] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.1rem;
  padding: 0.55rem 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
input[type=number]:focus { border-color: var(--z1); }
button.calc {
  background: var(--z1);

  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  padding: 0.55rem 2rem;
  cursor: pointer;
  transition: opacity 0.2s;
}
button.calc:hover { opacity: 0.85; }

/* ── Stats row ── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.8rem;
  margin-bottom: 2rem;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);

}
.stat-label { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; }
.stat-sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.2rem; }
.stat.highlight { border-color: var(--z1); }
.stat.highlight .stat-value { color: var(--z1); }

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.5rem;
  margin-bottom: 2rem;
}

/* ── Zone cards ── */
.zones { display: flex; flex-direction: column; gap: 0.6rem; }

.zone-card {
  background: var(--surface);
  border: 1px solid var(--border);

  gap: 1rem;
  padding: 0.9rem 1rem;

}
.zone-card:hover { background: var(--surface2); }
.zone-card.active { background: var(--surface2); border-color: var(--zc); }

.zone-num {

  font-size: 1.6rem;
  color: var(--zc);
  line-height: 1;

}
.zone-info {}

.zone-ref { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.06em; }
.zone-pct { font-size: 0.72rem; color: var(--zc); font-weight: 500; text-align: right; min-width: 48px; }
.zone-area { font-size: 1.05rem; font-weight: 500; text-align: right; min-width: 90px; }
.zone-m2 { font-size: 0.6rem; color: var(--muted); }

.zone-bar-wrap { grid-column: 1 / -1; margin-top: 0.4rem; display: none; }

.zone-detail {

  padding-top: 0.6rem;
  border-top: 1px solid var(--border);

}

.detail-item { }
.detail-label { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
.detail-val { font-size: 0.82rem; }

/* ── Slider for ratio ── */
.slider-wrap {
  grid-column: 1 / -1;
  display: none;
  align-items: center;
  gap: 0.8rem;
  padding-top: 0.5rem;
}
.zone-card.active .slider-wrap { display: flex; }
input[type=range] {
  flex: 1;
  accent-color: var(--zc);
  cursor: pointer;
}
.slider-label { font-size: 0.62rem; color: var(--muted); white-space: nowrap; }
.slider-val { font-size: 0.78rem; color: var(--zc); min-width: 36px; text-align: right; }

/* ── Side panel ── */
.side { display: flex; flex-direction: column; gap: 1rem; }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
}
.panel-head {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1rem;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
.panel-body { padding: 1rem; }

/* Donut chart */
.donut-wrap { display: flex; justify-content: center; margin-bottom: 1rem; position: relative; }
.donut-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.donut-center-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
.donut-center-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; }

/* Legend */
.legend-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.35rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem;
}
.legend-row:last-child { border-bottom: none; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; font-size: 0.68rem; color: var(--text); }
.legend-pct { color: var(--muted); font-size: 0.65rem; min-width: 40px; text-align: right; }
.legend-area { font-size: 0.68rem; min-width: 70px; text-align: right; }

/* BCN ref table */
.ref-row {
  display: flex;
  justify-content: space-between;
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.68rem;
  align-items: center;
}
.ref-row:last-child { border-bottom: none; }
.ref-tag {
  font-size: 0.55rem;
  padding: 0.15rem 0.4rem;
  border-radius: 1px;
  background: var(--dim);
  color: var(--muted);
  margin-left: 0.4rem;
}
.ref-tag.match { background: #1a2a10; color: var(--z5); }

/* Allocation check */
.alloc-bar {
  height: 8px;
  background: var(--dim);
  border-radius: 2px;
  margin: 1rem 0 0.4rem;
  overflow: hidden;
  display: flex;
}
.alloc-seg { height: 100%; transition: width 0.4s; }
.alloc-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.62rem;
}
.alloc-used { color: var(--z1); }
.alloc-remain { color: var(--muted); }
.alloc-warn { color: #e05a2b; }

/* warnings */
.warning {
  background: #1a0e0a;
  border: 1px solid #e05a2b55;
  padding: 0.6rem 0.8rem;
  font-size: 0.65rem;
  color: #e05a2b;
  margin-top: 0.6rem;
  display: none;
}
.warning.show { display: block; }

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .stats { grid-template-columns: 1fr 1fr; }
  .site-bar { grid-template-columns: 1fr 1fr; }
}

&lt;script&gt;
const zones = [
  {
    id: 'digital',
    name: 'Digital Market',
    subtitle: 'Core digital trading market',
    color: 'var(--z1)',
    hex: '#e8c547',
    defaultPct: 18,
    icon: '⬡',
    refMarkets: ['Sant Antoni (7,741m²)', 'Boqueria (6,089m²)'],
    refAvg: 6915,
    character: 'High density / Multi-level / All-hours',
    position: 'Central core node',
    program: 'Stalls · Digital displays · Trading hall',
  },
  {

    name: 'MeGa Market',
    subtitle: 'Large-scale general market',
    color: 'var(--z2)',
    hex: '#e05a2b',
    defaultPct: 22,
    icon: '▬',
    refMarkets: ['Sagrada Família (26,000m²)', 'Port (10,058m²)'],
    refAvg: 18029,
    character: 'Long-span / Single-floor / Linear',
    position: 'Along main arterial road',
    program: 'Fresh produce · Daily goods · Large stalls',
  },
  {
    id: 'regional',
    name: 'REGIONAL Market',
    subtitle: 'Regional specialty market',
    color: 'var(--z3)',
    hex: '#c84b8f',
    defaultPct: 15,
    icon: '◈',
    refMarkets: ['Ninot (6,037m²)', 'Galvany (5,504m²)'],
    refAvg: 5770,
    character: 'Mid-scale / Standalone / Distinctive',
    position: 'Secondary transport node',
    program: 'Local specialties · Crafts · Weekend market',
  },
  {
    id: 'education',
    name: 'Educational Center',
    subtitle: 'Education · Exhibition · Workshops',
    color: 'var(--z4)',
    hex: '#4b9ec8',
    defaultPct: 12,
    icon: '◻',
    refMarkets: ['Abaceria Central (4,034m²)', 'Concepció (4,320m²)'],
    refAvg: 4177,
    character: 'Flexible / Multi-purpose',
    position: 'Quiet end of site',
    program: 'Workshops · Exhibition hall · Cooking classes',
  },
  {
    id: 'opera',
    name: 'Opera Entertainment',
    subtitle: 'Performance · Entertainment · F&amp;B',
    color: 'var(--z5)',
    hex: '#8bc84b',
    defaultPct: 10,
    icon: '◉',
    refMarkets: ['Carmel (10,921m²)', 'Sant Gervasi (6,677m²)'],
    refAvg: 8799,
    character: 'High-ceiling / Stage presence / Night activation',
    position: 'Entertainment circuit endpoint',

  },
  {

    name: 'Open Air',
    subtitle: 'Outdoor market · Landscape plaza',
    color: 'var(--z6)',
    hex: '#7b6ee8',
    defaultPct: 23,
    icon: '∿',
    refMarkets: ['Boqueria outdoor · Plaza-type markets'],
    refAvg: 3000,
    character: 'Permeable / Flexible / Seasonal',
    position: 'Junction buffer + road interface',
    program: 'Temporary stalls · Event plaza · Green belt',
  },
];

const BCN_REF = [
  { name: 'Sagrada Família', area: 26000, zone: 'mega' },
  { name: 'Carmel', area: 10921, zone: 'opera' },
  { name: 'Port', area: 10058, zone: 'mega' },
  { name: 'Sant Antoni', area: 7741, zone: 'digital' },
  { name: 'Vall d\'Hebron', area: 5508, zone: null },
  { name: 'Sant Gervasi', area: 6677, zone: 'opera' },
  { name: 'Galvany', area: 5504, zone: 'regional' },
  { name: 'Canyelles', area: 4771, zone: null },
  { name: 'Sant Martí', area: 4642, zone: null },
  { name: 'Abaceria', area: 4034, zone: 'education' },
  { name: 'Sants', area: 4118, zone: null },
  { name: 'Concepció', area: 4320, zone: 'education' },
  { name: 'Ninot', area: 6037, zone: 'regional' },
  { name: 'Boqueria', area: 6089, zone: 'digital' },
  { name: 'Vallvidrera', area: 833, zone: null },
  { name: 'Nuria', area: 546, zone: null },
];

let pcts = zones.map(z =&gt; z.defaultPct);
let activeZone = null;

function fmt(n) { return Math.round(n).toLocaleString('de-DE'); }

function calculate() {
  const site = parseFloat(document.getElementById('siteArea').value) || 25000;
  const oaPct = parseFloat(document.getElementById('openAirPct').value) || 30;

  // Force open air zone to match slider
  pcts[5] = oaPct;
  const buildable = site * (1 - oaPct / 100);

  document.getElementById('s-site').textContent = fmt(site);
  document.getElementById('s-build').textContent = fmt(buildable);
  document.getElementById('s-equiv').textContent = (site / 4281).toFixed(1);

  const total = pcts.reduce((a, b) =&gt; a + b, 0);
  const areas = pcts.map(p =&gt; site * p / 100);

  renderZones(site, areas, total);
  renderDonut(areas, total, site);
  renderLegend(areas, total);
  renderAlloc(total, site, areas);
  renderBCN(areas);
}

function renderZones(site, areas, total) {
  const maxArea = Math.max(...areas);
  const container = document.getElementById('zonesContainer');
  container.innerHTML = '';

  zones.forEach((z, i) =&gt; {
    const card = document.createElement('div');
    card.className = 'zone-card' + (activeZone === i ? ' active' : '');
    card.style.setProperty('--zc', z.color);

    const barW = (areas[i] / maxArea * 100).toFixed(1);

    card.innerHTML = `
      &lt;div class=&quot;zone-num&quot;&gt;${String(i+1).padStart(2,'0')}&lt;/div&gt;
      &lt;div class=&quot;zone-info&quot;&gt;
        &lt;div class=&quot;zone-name&quot;&gt;${z.name}&lt;/div&gt;
        &lt;div class=&quot;zone-ref&quot;&gt;${z.subtitle}&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;zone-pct&quot;&gt;${pcts[i].toFixed(0)}%&lt;/div&gt;
      &lt;div&gt;
        &lt;div class=&quot;zone-area&quot;&gt;${fmt(areas[i])}&lt;/div&gt;
        &lt;div class=&quot;zone-m2&quot;&gt;m²&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;width:60px;&quot;&gt;
        &lt;div class=&quot;zone-bar-bg&quot; style=&quot;background:var(--dim);height:4px;border-radius:2px;&quot;&gt;
          &lt;div style=&quot;width:${barW}%;height:100%;background:${z.hex};border-radius:2px;transition:width 0.4s;&quot;&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div style=&quot;grid-column:1/-1;display:${activeZone===i?'grid':'none'};grid-template-columns:1fr 1fr 1fr;gap:0.8rem;padding-top:0.6rem;border-top:1px solid var(--border);margin-top:0.2rem;&quot;&gt;
        &lt;div&gt;&lt;div class=&quot;detail-label&quot;&gt;BCN Reference&lt;/div&gt;&lt;div class=&quot;detail-val&quot; style=&quot;font-size:0.7rem;color:${z.hex};&quot;&gt;${z.refMarkets.join(' / ')}&lt;/div&gt;&lt;/div&gt;
        &lt;div&gt;&lt;div class=&quot;detail-label&quot;&gt;Spatial Character&lt;/div&gt;&lt;div class=&quot;detail-val&quot; style=&quot;font-size:0.72rem;&quot;&gt;${z.character}&lt;/div&gt;&lt;/div&gt;
        &lt;div&gt;&lt;div class=&quot;detail-label&quot;&gt;Site Position&lt;/div&gt;&lt;div class=&quot;detail-val&quot; style=&quot;font-size:0.72rem;&quot;&gt;${z.position}&lt;/div&gt;&lt;/div&gt;
        &lt;div style=&quot;grid-column:1/-1;&quot;&gt;&lt;div class=&quot;detail-label&quot;&gt;Recommended Program&lt;/div&gt;&lt;div class=&quot;detail-val&quot; style=&quot;font-size:0.72rem;&quot;&gt;${z.program}&lt;/div&gt;&lt;/div&gt;
        &lt;div style=&quot;grid-column:1/-1;display:flex;align-items:center;gap:0.8rem;padding-top:0.4rem;&quot;&gt;
          &lt;span class=&quot;slider-label&quot;&gt;Adjust ratio&lt;/span&gt;
          &lt;input type=&quot;range&quot; min=&quot;3&quot; max=&quot;40&quot; step=&quot;1&quot; value=&quot;${pcts[i]}&quot;
            style=&quot;flex:1;accent-color:${z.hex};&quot;
            oninput=&quot;adjustPct(${i}, this.value)&quot;&gt;
          &lt;span style=&quot;font-size:0.78rem;color:${z.hex};min-width:36px;text-align:right;&quot; id=&quot;slv-${i}&quot;&gt;${pcts[i]}%&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    `;

    card.addEventListener('click', (e) =&gt; {
      if (e.target.tagName === 'INPUT') return;
      activeZone = (activeZone === i) ? null : i;
      calculate();
    });

    container.appendChild(card);
  });
}

function adjustPct(idx, val) {
  pcts[idx] = parseFloat(val);
  document.getElementById(`slv-${idx}`).textContent = val + '%';
  calculate();
}

function renderDonut(areas, total, site) {
  const svg = document.getElementById('donut');
  svg.innerHTML = '';
  const cx = 90, cy = 90, r = 75, inner = 52;
  let cumAngle = -Math.PI / 2;

  const totalArea = areas.reduce((a, b) =&gt; a + b, 0);
  const usedPct = Math.min(100, (totalArea / site * 100));
  document.getElementById('donutVal').textContent = Math.round(usedPct) + '%';

  areas.forEach((a, i) =&gt; {
    const frac = total &gt; 0 ? (pcts[i] / total) : 0;
    const angle = frac * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    const x2 = cx + r * Math.cos(cumAngle + angle);
    const y2 = cy + r * Math.sin(cumAngle + angle);
    const xi1 = cx + inner * Math.cos(cumAngle);
    const yi1 = cy + inner * Math.sin(cumAngle);
    const xi2 = cx + inner * Math.cos(cumAngle + angle);
    const yi2 = cy + inner * Math.sin(cumAngle + angle);
    const large = angle &gt; Math.PI ? 1 : 0;

    if (frac &gt; 0.002) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${inner} ${inner} 0 ${large} 0 ${xi1} ${yi1} Z`);
      path.setAttribute('fill', zones[i].hex);
      path.setAttribute('opacity', '0.9');
      svg.appendChild(path);
    }
    cumAngle += angle;
  });
}

function renderLegend(areas, total) {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  zones.forEach((z, i) =&gt; {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `
      &lt;div class=&quot;legend-dot&quot; style=&quot;background:${z.hex};&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;legend-name&quot;&gt;${z.name}&lt;/div&gt;
      &lt;div class=&quot;legend-pct&quot;&gt;${pcts[i].toFixed(0)}%&lt;/div&gt;
      &lt;div class=&quot;legend-area&quot;&gt;${fmt(areas[i])} m²&lt;/div&gt;
    `;
    leg.appendChild(row);
  });
}

function renderAlloc(total, site, areas) {
  const bar = document.getElementById('allocBar');
  bar.innerHTML = '';
  const usedPct = Math.min(100, total);

  zones.forEach((z, i) =&gt; {
    const seg = document.createElement('div');
    seg.className = 'alloc-seg';
    seg.style.width = Math.min(pcts[i], 100) + '%';
    seg.style.background = z.hex;
    bar.appendChild(seg);
  });

  const totalArea = areas.reduce((a, b) =&gt; a + b, 0);
  const remain = site - totalArea;

  document.getElementById('allocUsed').textContent = `Allocated: ${fmt(totalArea)} m²`;
  document.getElementById('allocRemain').textContent = remain &gt;= 0
    ? `Remaining: ${fmt(remain)} m²`
    : `Over by: ${fmt(-remain)} m²`;
  document.getElementById('allocRemain').style.color = remain &lt; 0 ? '#e05a2b' : 'var(--muted)';
  document.getElementById('totalCheck').textContent = total.toFixed(0) + '%';

  document.getElementById('warnOver').classList.toggle('show', total &gt; 100);
  document.getElementById('warnUnder').classList.toggle('show', total &lt; 95 &amp;&amp; total &gt; 0);
}

function renderBCN(areas) {
  const ref = document.getElementById('bcnRef');
  ref.innerHTML = '';
  const sorted = [...BCN_REF].sort((a, b) =&gt; b.area - a.area).slice(0, 8);
  sorted.forEach(m =&gt; {
    const z = m.zone ? zones.find(z =&gt; z.id === m.zone) : null;
    const row = document.createElement('div');
    row.className = 'ref-row';
    row.innerHTML = `
      &lt;div&gt;
        &lt;span&gt;${m.name}&lt;/span&gt;
        ${z ? `&lt;span class=&quot;ref-tag match&quot; style=&quot;background:${z.hex}22;color:${z.hex};&quot;&gt;${z.name.split(' ')[0]}&lt;/span&gt;` : '&lt;span class=&quot;ref-tag&quot;&gt;—&lt;/span&gt;'}
      &lt;/div&gt;
      &lt;div style=&quot;font-size:0.72rem;&quot;&gt;${fmt(m.area)} m²&lt;/div&gt;
    `;
    ref.appendChild(row);
  });
}

calculate();
